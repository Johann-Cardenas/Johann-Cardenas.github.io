# Jekyll configuration to process blog/*.html files with Liquid

# Add blog as a collection so Jekyll processes HTML files in /blog with Liquid
collections:
  blog:
    output: true
    permalink: /blog/:name.html

# Include the blog directory in the list of directories to process
include:
  - blog

# Exclude non-deployable files from Jekyll build
exclude:
  - README.md
  - LICENSE.txt
  - CLAUDE.md
  - .github/
  - "*.py"
  - "*.pkl.bz2"
  - node_modules/

# Other default config options can go here
